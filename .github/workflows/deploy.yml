name: Infrastructure Deployment

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.5.0

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are set
        run: |
          MISSING=0
          
          # Check environment-specific secrets
          if [ -z "${{ secrets.AWS_ROLE_DEV }}" ]; then
            echo "❌ Missing secret: AWS_ROLE_DEV"
            MISSING=1
          fi
          if [ -z "${{ secrets.AWS_ROLE_STAGING }}" ]; then
            echo "❌ Missing secret: AWS_ROLE_STAGING"
            MISSING=1
          fi
          if [ -z "${{ secrets.AWS_ROLE_PROD }}" ]; then
            echo "❌ Missing secret: AWS_ROLE_PROD"
            MISSING=1
          fi
          
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "Deploy cannot proceed without required AWS role secrets."
            echo "Configure the following in repository settings:"
            echo "  - AWS_ROLE_DEV: IAM role ARN for dev environment"
            echo "  - AWS_ROLE_STAGING: IAM role ARN for staging environment"
            echo "  - AWS_ROLE_PROD: IAM role ARN for production environment"
            exit 1
          fi
          
          echo "✅ All required secrets are configured"

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate-secrets
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_{0}', matrix.environment)] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var-file="environments/${{ matrix.environment }}.tfvars" \
            -out=tfplan-${{ matrix.environment }}

      - name: Upload plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ matrix.environment }}
          path: infrastructure/terraform/tfplan-${{ matrix.environment }}

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        environment: [dev, staging, prod]
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_{0}', matrix.environment)] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check SLO Compliance (Production Only)
        if: matrix.environment == 'prod'
        run: |
          node performance/scripts/check-slo-compliance.js
        env:
          PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infrastructure/terraform

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan-${{ matrix.environment }}

      - name: Output infrastructure details
        working-directory: infrastructure/terraform
        run: terraform output -json > /tmp/outputs-${{ matrix.environment }}.json

      - name: Upload outputs
        uses: actions/upload-artifact@v7
        with:
          name: outputs-${{ matrix.environment }}
          path: /tmp/outputs-${{ matrix.environment }}.json
