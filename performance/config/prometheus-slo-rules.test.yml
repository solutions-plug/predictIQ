# Unit tests for Prometheus SLO rules
tests:
  - interval: 1m
    input_series:
      - series: 'http_requests_total{status="200"}'
        values: '100+100x10'
      - series: 'http_requests_total{status="500"}'
        values: '1+0x10'
      - series: 'http_request_duration_seconds_bucket{le="0.2"}'
        values: '95+5x10'
      - series: 'http_request_duration_seconds_bucket{le="+Inf"}'
        values: '100+10x10'
      - series: 'db_query_duration_seconds_bucket{le="0.05"}'
        values: '90+5x10'
      - series: 'db_query_duration_seconds_bucket{le="+Inf"}'
        values: '100+10x10'
      - series: 'redis_commands_total{status="success"}'
        values: '1000+100x10'
      - series: 'redis_commands_total{status="failed"}'
        values: '1+0x10'

  - interval: 5m
    input_series:
      - series: 'http_requests_total{status="200"}'
        values: '500+100x10'
      - series: 'http_requests_total{status="500"}'
        values: '5+1x10'
    promql_expr_test:
      - expr: 'sum(rate(http_requests_total{status=~"2..|3.."}[5m])) / sum(rate(http_requests_total[5m])) * 100'
        expected_samples:
          - labels: '{}'
            value: '99'

  - interval: 1h
    input_series:
      - series: 'http_requests_total{status="200"}'
        values: '3600+100x24'
      - series: 'http_requests_total{status="500"}'
        values: '36+1x24'
    promql_expr_test:
      - expr: 'slo:api_availability:success_rate'
        expected_samples:
          - labels: '{}'
            value: '99'

  - interval: 1m
    input_series:
      - series: 'http_requests_total{status="200"}'
        values: '100+0x10'
      - series: 'http_requests_total{status="500"}'
        values: '100+0x10'
    promql_expr_test:
      - expr: 'sum(rate(http_requests_total{status=~"2..|3.."}[5m])) / sum(rate(http_requests_total[5m])) * 100'
        expected_samples:
          - labels: '{}'
            value: '50'

  - interval: 1m
    input_series:
      - series: 'http_request_duration_seconds_bucket{le="0.2"}'
        values: '50+0x10'
      - series: 'http_request_duration_seconds_bucket{le="+Inf"}'
        values: '100+0x10'
    promql_expr_test:
      - expr: 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) <= 0.2'
        expected_samples:
          - labels: '{}'
            value: '1'

  - interval: 1m
    input_series:
      - series: 'redis_commands_total{status="success"}'
        values: '1000+0x10'
      - series: 'redis_commands_total{status="failed"}'
        values: '0+0x10'
    promql_expr_test:
      - expr: 'sum(rate(redis_commands_total{status="success"}[5m])) / sum(rate(redis_commands_total[5m])) * 100'
        expected_samples:
          - labels: '{}'
            value: '100'

  - interval: 1m
    input_series:
      - series: 'http_requests_total{status="200"}'
        values: '100+0x10'
      - series: 'http_requests_total{status="500"}'
        values: '1+0x10'
    alert_rule_test:
      - alert_rule_name: 'SLOFastBurn'
        eval_time: '10m'
        expected_alerts:
          - exp_labels:
              severity: 'critical'
              slo: 'api_availability'
            exp_annotations:
              summary: 'SLO fast burn detected for API availability'

  - interval: 1m
    input_series:
      - series: 'http_requests_total{status="200"}'
        values: '100+0x10'
      - series: 'http_requests_total{status="500"}'
        values: '100+0x10'
    alert_rule_test:
      - alert_rule_name: 'SLOErrorBudgetExhausted'
        eval_time: '10m'
        expected_alerts:
          - exp_labels:
              severity: 'critical'
              slo: 'api_availability'
            exp_annotations:
              summary: 'SLO error budget exhausted for API availability'
