# PredictIQ Alert Configuration
# This file defines alerting rules for critical system metrics

groups:
  - name: api_performance
    interval: 30s
    rules:
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API response time detected"
          description: "API p95 response time is {{ $value }}s, exceeding 200ms threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/high-api-response-time"

      - alert: CriticalAPIResponseTime
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Critical API response time detected"
          description: "API p99 response time is {{ $value }}s, exceeding 500ms critical threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/critical-api-response-time"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.001
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}, exceeding 0.1% threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/high-error-rate"

      - alert: LowThroughput
        expr: rate(http_requests_total[5m]) < 1000
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "Low request throughput"
          description: "Request throughput is {{ $value }} req/s, below 1000 req/s minimum"
          runbook_url: "https://docs.predictiq.com/runbooks/low-throughput"

  - name: cache_performance
    interval: 30s
    rules:
      - alert: LowCacheHitRate
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.8
        for: 10m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }}, below 80% threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/low-cache-hit-rate"

      - alert: CacheCircuitBreakerOpen
        expr: cache_circuit_breaker_state == 1
        for: 2m
        labels:
          severity: page
          component: cache
        annotations:
          summary: "Redis cache circuit breaker is open"
          description: "The Redis cache circuit breaker has been open for more than 2 minutes. All cache reads are failing open, causing increased load on the database and RPC endpoints. Immediate operator response required."
          runbook_url: "https://docs.predictiq.com/runbooks/cache-circuit-breaker-open"

  - name: database_performance
    interval: 30s
    rules:
      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(db_query_duration_seconds_bucket[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "Database p95 query time is {{ $value }}s, exceeding 50ms threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/slow-database-queries"

      - alert: CriticalDatabaseQueries
        expr: histogram_quantile(0.99, rate(db_query_duration_seconds_bucket[5m])) > 0.1
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Critical database query performance"
          description: "Database p99 query time is {{ $value }}s, exceeding 100ms critical threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/critical-database-queries"

      - alert: HighDBConnectionPoolUtilization
        expr: db_connections_active / db_connections_max > 0.8
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database connection pool utilization"
          description: "Connection pool utilization is {{ $value | humanizePercentage }}, exceeding 80% threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/high-db-connection-pool-utilization"

      - alert: CriticalDBConnectionPoolUtilization
        expr: db_connections_active / db_connections_max > 0.95
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Critical database connection pool utilization"
          description: "Connection pool utilization is {{ $value | humanizePercentage }}, exceeding 95% critical threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/critical-db-connection-pool-utilization"

  - name: contract_performance
    interval: 1m
    rules:
      - alert: HighContractGasCosts
        expr: contract_gas_used{operation="create_market"} > 500000
        for: 5m
        labels:
          severity: warning
          component: contracts
        annotations:
          summary: "High gas costs for market creation"
          description: "Create market gas cost is {{ $value }}, exceeding 500000 threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/high-contract-gas-costs"

      - alert: HighBetGasCosts
        expr: contract_gas_used{operation="place_bet"} > 200000
        for: 5m
        labels:
          severity: warning
          component: contracts
        annotations:
          summary: "High gas costs for placing bets"
          description: "Place bet gas cost is {{ $value }}, exceeding 200000 threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/high-bet-gas-costs"

      - alert: HighResolutionGasCosts
        expr: contract_gas_used{operation="resolve_market"} > 300000
        for: 5m
        labels:
          severity: warning
          component: contracts
        annotations:
          summary: "High gas costs for market resolution"
          description: "Resolve market gas cost is {{ $value }}, exceeding 300000 threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/high-resolution-gas-costs"

  - name: system_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~"predictiq-.*"} == 0
        for: 1m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Service is down"
          description: "{{ $labels.job }} has been down for more than 1 minute"
          runbook_url: "https://docs.predictiq.com/runbooks/service-down"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}, exceeding 90% threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/high-memory-usage"

      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%, exceeding 80% threshold"
          runbook_url: "https://docs.predictiq.com/runbooks/high-cpu-usage"

  - name: tts_quota
    interval: 1m
    rules:
      - alert: TTSHighRequestRate
        expr: rate(tts_requests_total[1m]) > 800
        for: 2m
        labels:
          severity: warning
          component: tts
        annotations:
          summary: "TTS request rate approaching Google Cloud quota"
          description: "TTS request rate is {{ $value }} req/min, approaching the 1000 req/min soft quota limit"

      - alert: TTSQuotaNearExhaustion
        expr: rate(tts_requests_total[1m]) > 950
        for: 1m
        labels:
          severity: critical
          component: tts
        annotations:
          summary: "TTS request rate critical — quota exhaustion imminent"
          description: "TTS request rate is {{ $value }} req/min, Google Cloud quota limit is 1000 req/min"

      - alert: TTSHighErrorRate
        expr: rate(tts_requests_total{status=~"4..|5.."}[5m]) / rate(tts_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
          component: tts
        annotations:
          summary: "TTS service elevated error rate"
          description: "TTS error rate is {{ $value | humanizePercentage }}, possibly caused by quota exhaustion or provider outage"

      - alert: TTSHighLatency
        expr: histogram_quantile(0.95, rate(tts_request_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          component: tts
        annotations:
          summary: "TTS p95 latency exceeds 10 s"
          description: "TTS p95 response time is {{ $value }}s — check Google Cloud TTS API status and quota"

  - name: performance_regression
    interval: 1h
    rules:
      - alert: PerformanceDegradation
        expr: |
          (
            histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1h]))
            /
            histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1h] offset 24h))
          ) > 1.1
        for: 30m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "Performance degradation detected"
          description: "Response time has degraded by more than 10% compared to 24h ago"
          runbook_url: "https://docs.predictiq.com/runbooks/performance-degradation"

      - alert: SignificantPerformanceDegradation
        expr: |
          (
            histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1h]))
            /
            histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1h] offset 24h))
          ) > 1.05
        for: 1h
        labels:
          severity: info
          component: performance
        annotations:
          summary: "Performance degradation alert threshold reached"
          description: "Response time has degraded by more than 5% compared to 24h ago (alert threshold)"
          runbook_url: "https://docs.predictiq.com/runbooks/significant-performance-degradation"

  - name: email_worker
    interval: 30s
    rules:
      - alert: EmailWorkerDown
        expr: absent(up{job="predictiq-api"}) or increase(worker_crash_total{worker="email_queue_worker"}[60s]) > 0
        for: 1m
        labels:
          severity: critical
          component: email
        annotations:
          summary: "Email queue worker has crashed"
          description: "The email queue worker has crashed {{ $value }} time(s) in the last 60 seconds. Emails may not be delivered."
          runbook_url: "https://docs.predictiq.com/runbooks/email-worker-down"

      - alert: EmailWorkerCrashLooping
        expr: increase(worker_crash_total{worker="email_queue_worker"}[5m]) >= 5
        for: 0m
        labels:
          severity: critical
          component: email
        annotations:
          summary: "Email queue worker is crash-looping"
          description: "The email queue worker has crashed {{ $value }} times in the last 5 minutes and has been permanently stopped. Manual intervention required."
          runbook_url: "https://docs.predictiq.com/runbooks/email-worker-down"

  - name: email_queue
    interval: 30s
    rules:
      - alert: EmailQueueDepthHigh
        expr: email_queue_depth > 100
        for: 5m
        labels:
          severity: warning
          component: email
        annotations:
          summary: "Email queue depth is high"
          description: "Email queue depth is {{ $value }}, exceeding 100 for more than 5 minutes"
          runbook_url: "https://docs.predictiq.com/runbooks/email-queue-depth-high"
